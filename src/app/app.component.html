<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <a routerLink="/home" class="brand">
        <i class="pi pi-home"></i>
        <span>FSA Rental</span>
      </a>
    </div>

    <nav class="header-center">
      <a routerLink="/home" routerLinkActive="active" class="nav-item">Home</a>
      <a routerLink="/listings" routerLinkActive="active" class="nav-item">Listings</a>
      <a *ngIf="isAuthenticated() && isOwner()" routerLink="/listings/create" routerLinkActive="active" class="nav-item">
        Owner Studio
      </a>
    </nav>

    <div class="header-right">
      <ng-container *ngIf="isAuthenticated(); else guestActions">
        <span class="user-name" *ngIf="user() as currentUser">
          {{ currentUser.name || currentUser.username }}
        </span>
        <button pButton type="button" icon="pi pi-sign-out" label="Logout" severity="secondary" [text]="true" (click)="logout()"></button>
      </ng-container>
      <ng-template #guestActions>
        <button pButton type="button" icon="pi pi-sign-in" label="Login" (click)="login()"></button>
      </ng-template>
    </div>
  </div>
</header>

<main class="app-content">
  <p-message
    *ngIf="isAuthenticated() && !isOwner()"
    severity="warn"
    text="Owner Studio is available only for the OWNER role.">
  </p-message>

  <p-message *ngIf="authError()" severity="error" [text]="authError() || ''"></p-message>

  <router-outlet></router-outlet>
</main>
