<app-mode-tabs></app-mode-tabs>

<app-hero-section
  image="hero.jpg"
  title="Find a place to live"
  subtitle="Browse apartments, houses and land for long-term rent or sale across Slovakia.">
  <app-search-filters
    [searchText]="searchText()"
    [propertyType]="selectedPropertyType()"
    [listingType]="selectedListingType()"
    (searchTextChange)="setSearchText($event)"
    (propertyTypeChange)="setPropertyType($event)"
    (listingTypeChange)="setListingType($event)"
    (search)="loadListings()">
  </app-search-filters>
</app-hero-section>

<p-message *ngIf="error()" severity="warn" [text]="error() || ''"></p-message>

<section *ngIf="loading()" class="loading-grid">
  <p-skeleton width="100%" height="260px"></p-skeleton>
  <p-skeleton width="100%" height="260px"></p-skeleton>
  <p-skeleton width="100%" height="260px"></p-skeleton>
  <p-skeleton width="100%" height="260px"></p-skeleton>
</section>

<app-listings-carousel
  *ngIf="!loading()"
  [title]="firstCity() + ': featured properties'"
  [items]="featuredListings()">
</app-listings-carousel>

<app-listings-carousel
  *ngIf="!loading()"
  title="Recommended listings"
  [items]="extraListings()"
  [imageSeedOffset]="250">
</app-listings-carousel>

<app-property-types></app-property-types>

<app-popular-regions></app-popular-regions>
