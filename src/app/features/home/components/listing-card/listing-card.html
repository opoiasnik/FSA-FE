<article class="listing-tile" [routerLink]="['/listings', listing.id]" style="cursor: pointer">
  <div class="tile-media">
    <img [src]="imageUrl" [alt]="listing.title" loading="lazy" />
    <span *ngIf="badge" class="favorite-chip">{{ badge }}</span>
    <button
      *ngIf="canFavorite()"
      pButton
      type="button"
      [icon]="isFavorite() ? 'pi pi-heart-fill' : 'pi pi-heart'"
      [rounded]="true"
      [text]="true"
      class="favorite-btn"
      [class.favorite-btn--active]="isFavorite()"
      (click)="toggleFavorite($event)">
    </button>
  </div>
  <h3>{{ listing.title }}</h3>
  <p class="listing-tile__location">{{ location }}</p>
  <p class="listing-tile__price">
    {{ listing.price.amount }} {{ listing.price.currency }}{{ priceSuffix }}
    <span class="listing-tile__deal">· {{ listing.listingType === 'RENT' ? 'For rent' : 'For sale' }}</span>
  </p>
</article>
