<form [formGroup]="form" (ngSubmit)="submitted.emit()" class="search-form">
  <label>
    ID ponuky
    <input type="number" formControlName="id" min="1" placeholder="Napr. 1">
  </label>
  <div class="search-actions">
    <button class="button accent" type="submit" [disabled]="loading">
      {{ loading ? 'Načítavam...' : submitLabel }}
    </button>
    <button *ngIf="secondaryLabel" class="button ghost" type="button" (click)="secondaryAction.emit()">
      {{ secondaryLabel }}
    </button>
  </div>
</form>
