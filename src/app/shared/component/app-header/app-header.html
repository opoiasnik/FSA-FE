<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <a routerLink="/home" class="brand">
        <i class="pi pi-home"></i>
        <span>RentArea</span>
      </a>
    </div>

    <nav class="header-center">
      <a routerLink="/home" routerLinkActive="active" class="nav-item">Home</a>
      <a routerLink="/listings" routerLinkActive="active" class="nav-item">Explore</a>
      <a
        *ngIf="isAuthenticated()"
        routerLink="/favourites"
        routerLinkActive="active"
        class="nav-item">
        Saved
      </a>
      <a
        *ngIf="isAuthenticated()"
        routerLink="/messages"
        routerLinkActive="active"
        class="nav-item">
        Inbox
      </a>
      <a
        *ngIf="isAuthenticated() && isOwner()"
        routerLink="/owner"
        routerLinkActive="active"
        class="nav-item">
        Owner Studio
      </a>
    </nav>

    <div class="header-right">
      <ng-container *ngIf="isAuthenticated(); else guestActions">
        <a routerLink="/profile" class="user-chip" *ngIf="user() as currentUser">
          <app-avatar [name]="currentUser.name || currentUser.username" [hue]="200" [verified]="true" [size]="32"></app-avatar>
          <span class="user-chip__name">{{ currentUser.name || currentUser.username }}</span>
        </a>
        <button
          pButton
          type="button"
          icon="pi pi-sign-out"
          label="Logout"
          [text]="true"
          class="auth-btn"
          (click)="logout()">
        </button>
      </ng-container>
      <ng-template #guestActions>
        <button
          pButton
          type="button"
          icon="pi pi-sign-in"
          label="Login"
          [text]="true"
          class="auth-btn"
          (click)="login()">
        </button>
      </ng-template>
    </div>
  </div>
</header>
